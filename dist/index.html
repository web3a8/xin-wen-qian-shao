<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>news push</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f5f5;
        --panel: #ffffff;
        --panel-soft: #fafafa;
        --text: #111827;
        --muted: #6b7280;
        --line: #e5e7eb;
        --line-strong: #d1d5db;
        --accent: #2563eb;
        --accent-soft: #eff6ff;
        --accent-line: #bfdbfe;
        --shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      }

      body[data-theme="dark"] {
        color-scheme: dark;
        --bg: #0b1220;
        --panel: #111827;
        --panel-soft: #0f172a;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --line: #253045;
        --line-strong: #334155;
        --accent: #60a5fa;
        --accent-soft: rgba(96, 165, 250, 0.12);
        --accent-line: rgba(96, 165, 250, 0.28);
        --shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "SF Pro Text", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input {
        font: inherit;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        background: color-mix(in srgb, var(--panel) 92%, transparent);
        backdrop-filter: blur(18px);
        border-bottom: 1px solid var(--line);
      }

      .topbar-inner,
      .page {
        width: min(1320px, calc(100vw - 32px));
        margin: 0 auto;
      }

      .topbar-inner {
        min-height: 72px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
      }

      .brand {
        min-width: 0;
      }

      .brand-title {
        margin: 0;
        font-size: 1.25rem;
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      .brand-title span {
        color: var(--accent);
      }

      .brand-subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .toolbar-link,
      .theme-toggle {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        height: 40px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel);
        color: var(--text);
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
        transition: border-color 0.18s ease, background-color 0.18s ease, transform 0.18s ease;
      }

      .toolbar-link:hover,
      .theme-toggle:hover {
        border-color: var(--accent-line);
        background: var(--panel-soft);
        transform: translateY(-1px);
      }

      .toolbar-icon {
        width: 16px;
        height: 16px;
        flex: 0 0 16px;
        color: var(--accent);
      }

      .page {
        padding: 24px 0 40px;
      }

      .layout {
        display: grid;
        grid-template-columns: 250px minmax(0, 1fr);
        gap: 24px;
        align-items: start;
      }

      .nav {
        position: sticky;
        top: 96px;
        align-self: start;
      }

      .nav-title {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .nav-list {
        display: grid;
        gap: 10px;
        max-height: calc(100vh - 144px);
        overflow-y: auto;
        padding-right: 6px;
        scrollbar-width: thin;
        scrollbar-color: color-mix(in srgb, var(--line-strong) 82%, transparent) transparent;
      }

      .nav-list::-webkit-scrollbar {
        width: 8px;
      }

      .nav-list::-webkit-scrollbar-track {
        background: transparent;
      }

      .nav-list::-webkit-scrollbar-thumb {
        background: color-mix(in srgb, var(--line-strong) 82%, transparent);
        border-radius: 999px;
      }

      .nav-list::-webkit-scrollbar-thumb:hover {
        background: color-mix(in srgb, var(--accent-line) 90%, var(--line-strong));
      }

      .nav-item {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--panel);
        color: var(--text);
        text-align: left;
        transition: border-color 0.18s ease, background-color 0.18s ease, transform 0.18s ease;
      }

      .nav-item:hover {
        border-color: var(--accent-line);
        background: var(--panel-soft);
        transform: translateY(-1px);
      }

      .nav-item.active {
        border-color: var(--accent-line);
        background: var(--accent-soft);
      }

      .nav-item span {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .nav-count {
        flex: 0 0 auto;
        min-width: 26px;
        height: 26px;
        padding: 0 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: color-mix(in srgb, var(--panel-soft) 72%, transparent);
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 0.76rem;
      }

      .feed {
        border: 1px solid var(--line);
        border-radius: 26px;
        background: var(--panel);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .feed-toolbar {
        padding: 22px 24px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .feed-title {
        margin: 0;
        font-size: 1.05rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .feed-caption {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .search {
        flex: 0 1 320px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        height: 44px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel-soft);
      }

      .search svg {
        width: 16px;
        height: 16px;
        color: var(--muted);
        flex: 0 0 16px;
      }

      .search input {
        width: 100%;
        border: 0;
        outline: 0;
        background: transparent;
        color: var(--text);
      }

      .list {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .item {
        display: grid;
        grid-template-columns: 56px minmax(0, 1fr) 44px;
        gap: 16px;
        align-items: center;
        padding: 18px 24px;
        border-bottom: 1px solid var(--line);
        transition: background-color 0.18s ease;
      }

      .item:last-child {
        border-bottom: 0;
      }

      .item:hover {
        background: var(--panel-soft);
      }

      .rank {
        font-size: 1.55rem;
        line-height: 1;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: #9ca3af;
      }

      .item:nth-child(1) .rank {
        color: #ef4444;
      }

      .item:nth-child(2) .rank {
        color: #f97316;
      }

      .item:nth-child(3) .rank {
        color: #f59e0b;
      }

      .title {
        margin: 0;
        font-size: 1rem;
        font-weight: 600;
        line-height: 1.6;
        letter-spacing: -0.01em;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .title a:hover {
        color: var(--accent);
      }

      .meta {
        margin-top: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 0.84rem;
      }

      .summary {
        margin-top: 10px;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.75;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 24px;
        padding: 0 10px;
        border-radius: 999px;
        background: var(--panel-soft);
        border: 1px solid var(--line);
        color: var(--text);
      }

      .domain {
        max-width: 240px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .open-link {
        width: 36px;
        height: 36px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: var(--muted);
        background: var(--panel);
        transition: border-color 0.18s ease, color 0.18s ease, background-color 0.18s ease;
      }

      .item:hover .open-link {
        border-color: var(--accent-line);
        color: var(--accent);
        background: color-mix(in srgb, var(--accent-soft) 52%, var(--panel));
      }

      .open-link svg {
        width: 15px;
        height: 15px;
      }

      .empty {
        padding: 28px 24px;
        color: var(--muted);
        line-height: 1.8;
      }

      @media (max-width: 1080px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .nav {
          position: static;
        }

        .nav-list {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          max-height: none;
          overflow: visible;
          padding-right: 0;
        }
      }

      @media (max-width: 720px) {
        .topbar-inner {
          align-items: flex-start;
          padding: 14px 0;
          min-height: unset;
        }

        .topbar-inner,
        .page {
          width: min(100vw - 20px, 1320px);
        }

        .toolbar {
          width: 100%;
        }

        .toolbar-link,
        .theme-toggle {
          flex: 1 1 calc(33.333% - 7px);
          justify-content: center;
        }

        .nav-list {
          grid-template-columns: 1fr 1fr;
        }

        .feed-toolbar {
          padding: 18px 16px;
          align-items: stretch;
          flex-direction: column;
        }

        .search {
          width: 100%;
          flex-basis: auto;
        }

        .item {
          grid-template-columns: 42px minmax(0, 1fr);
          padding: 16px;
        }

        .open-link {
          display: none;
        }

        .rank {
          font-size: 1.28rem;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <h1 class="brand-title"><span>&gt;</span> news push</h1>
          <p class="brand-subtitle">目前专注于AI</p>
        </div>
        <div class="toolbar">
          <a class="toolbar-link" href="./latest.json">
            <svg class="toolbar-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M8 5 3 12l5 7M16 5l5 7-5 7M13 4l-2 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Full JSON</span>
          </a>
          <a class="toolbar-link" href="./meta.json">
            <svg class="toolbar-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/>
              <path d="M12 10v6M12 7.5h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Meta</span>
          </a>
          <button class="theme-toggle" id="theme-toggle" type="button">
            <svg class="toolbar-icon" id="theme-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"></svg>
            <span>切换主题</span>
          </button>
        </div>
      </div>
    </header>

    <main class="page">
      <div class="layout">
        <aside class="nav">
          <h2 class="nav-title">信息源</h2>
          <div class="nav-list" id="source-filters"></div>
        </aside>

        <section class="feed">
          <div class="feed-toolbar">
            <div>
              <h2 class="feed-title">信息流</h2>
              <p class="feed-caption" id="feed-caption">正在读取最近 24 小时的数据…</p>
            </div>
            <label class="search">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="1.8"/>
                <path d="m16 16 4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
              <input id="search-input" type="search" placeholder="搜索标题或来源">
            </label>
          </div>
          <ul class="list" id="article-list">
            <li class="empty">正在读取最新数据…</li>
          </ul>
        </section>
      </div>
    </main>

    <script>
      const state = {
        articles: [],
        sourceFilter: "全部",
        query: "",
        generatedAt: ""
      };

      const articleList = document.getElementById("article-list");
      const sourceFilters = document.getElementById("source-filters");
      const feedCaption = document.getElementById("feed-caption");
      const searchInput = document.getElementById("search-input");
      const themeToggle = document.getElementById("theme-toggle");
      const themeIcon = document.getElementById("theme-icon");

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll("\"", "&quot;")
          .replaceAll("'", "&#39;");
      }

      function formatNumber(value) {
        return new Intl.NumberFormat("zh-CN").format(Number(value || 0));
      }

      function formatDate(value) {
        if (!value) {
          return "--";
        }

        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return value;
        }

        return new Intl.DateTimeFormat("zh-CN", {
          month: "numeric",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit"
        }).format(date);
      }

      function getDomain(value) {
        try {
          const url = new URL(value);
          return url.hostname.replace(/^www\./, "");
        } catch (error) {
          return "";
        }
      }

      function getThemeIcon(theme) {
        if (theme === "dark") {
          return '<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>';
        }

        return '<circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="1.8"/><path d="M12 2.8v2.1M12 19.1v2.1M21.2 12h-2.1M4.9 12H2.8M18.5 5.5 17 7M7 17l-1.5 1.5M18.5 18.5 17 17M7 7 5.5 5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>';
      }

      function setTheme(theme) {
        document.body.dataset.theme = theme;
        themeIcon.innerHTML = getThemeIcon(theme);
        localStorage.setItem("news-push-theme", theme);
      }

      function restoreTheme() {
        const savedTheme = localStorage.getItem("news-push-theme");
        if (savedTheme === "dark" || savedTheme === "light") {
          setTheme(savedTheme);
          return;
        }

        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        setTheme(prefersDark ? "dark" : "light");
      }

      function getVisibleArticles() {
        const query = state.query.trim().toLowerCase();

        return state.articles.filter((article) => {
          const matchesSource = state.sourceFilter === "全部" || article.source_name === state.sourceFilter;
          const matchesQuery =
            !query ||
            article.title.toLowerCase().includes(query) ||
            article.source_name.toLowerCase().includes(query);

          return matchesSource && matchesQuery;
        });
      }

      function renderFilters() {
        const counts = new Map();

        for (const article of state.articles) {
          counts.set(article.source_name, (counts.get(article.source_name) || 0) + 1);
        }

        const filterNames = [
          ["全部", state.articles.length],
          ...[...counts.entries()].sort((a, b) => b[1] - a[1]).slice(0, 18)
        ];

        sourceFilters.innerHTML = filterNames
          .map(([name, count]) => `
            <button
              type="button"
              class="nav-item ${name === state.sourceFilter ? "active" : ""}"
              data-source="${escapeHtml(name)}"
            >
              <span>${escapeHtml(name)}</span>
              <span class="nav-count">${formatNumber(count)}</span>
            </button>
          `)
          .join("");

        for (const button of sourceFilters.querySelectorAll("[data-source]")) {
          button.addEventListener("click", () => {
            state.sourceFilter = button.dataset.source;
            renderFilters();
            renderArticles();
          });
        }
      }

      function renderArticles() {
        const visible = getVisibleArticles();
        const updatedSuffix = state.generatedAt ? ` · 更新于 ${formatDate(state.generatedAt)}` : "";
        feedCaption.textContent = `共 ${formatNumber(visible.length)} 条，按发布时间展示最近 24 小时结果${updatedSuffix}。`;

        articleList.innerHTML = visible.length
          ? visible
              .slice(0, 120)
              .map((article, index) => {
                const domain = getDomain(article.link);
                return `
                  <li class="item">
                    <div class="rank">${index + 1}</div>
                    <div>
                      <p class="title">
                        <a href="${escapeHtml(article.link)}" target="_blank" rel="noreferrer">${escapeHtml(article.title)}</a>
                      </p>
                      <div class="meta">
                        <span class="badge">${escapeHtml(article.source_name)}</span>
                        <span>${escapeHtml(formatDate(article.published_at))}</span>
                        ${domain ? `<span class="domain">${escapeHtml(domain)}</span>` : ""}
                      </div>
                      ${article.summary && article.summary !== article.title ? `<p class="summary">${escapeHtml(article.summary)}</p>` : ""}
                    </div>
                    <a class="open-link" href="${escapeHtml(article.link)}" target="_blank" rel="noreferrer" aria-label="打开原文">
                      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M8 16 16 8M10 8h6v6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                      </svg>
                    </a>
                  </li>
                `;
              })
              .join("")
          : '<li class="empty">没有匹配到结果，试试切换来源或清空搜索词。</li>';
      }

      async function loadData() {
        try {
          const [metaResponse, latestLiteResponse] = await Promise.all([
            fetch("./meta.json", { cache: "no-store" }),
            fetch("./latest-lite.json", { cache: "no-store" })
          ]);

          if (!metaResponse.ok || !latestLiteResponse.ok) {
            throw new Error("数据文件读取失败");
          }

          const meta = await metaResponse.json();
          const latestLite = await latestLiteResponse.json();
          const articles = Array.isArray(latestLite.articles) ? latestLite.articles.slice() : [];

          articles.sort((left, right) => {
            const leftTime = new Date(left.published_at || 0).getTime();
            const rightTime = new Date(right.published_at || 0).getTime();
            return rightTime - leftTime;
          });

          state.articles = articles;
          state.generatedAt = meta && meta.generated_at ? meta.generated_at : "";
          renderFilters();
          renderArticles();
        } catch (error) {
          feedCaption.textContent = "数据读取失败";
          articleList.innerHTML = `<li class="empty">页面未能加载数据文件：${escapeHtml(error.message || error)}</li>`;
        }
      }

      searchInput.addEventListener("input", (event) => {
        state.query = event.target.value || "";
        renderArticles();
      });

      themeToggle.addEventListener("click", () => {
        const nextTheme = document.body.dataset.theme === "dark" ? "light" : "dark";
        setTheme(nextTheme);
      });

      restoreTheme();
      loadData();
    </script>
  </body>
</html>
