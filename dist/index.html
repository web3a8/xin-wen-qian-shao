<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>大火蒸馏</title>
    <link rel="icon" type="image/gif" href="./assets/images/zl.gif">
    <link rel="shortcut icon" type="image/gif" href="./assets/images/zl.gif">
    <link rel="apple-touch-icon" href="./assets/images/zl.gif">
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f5f5;
        --panel: #ffffff;
        --panel-soft: #fafafa;
        --text: #111827;
        --muted: #6b7280;
        --line: #e5e7eb;
        --line-strong: #d1d5db;
        --accent: #2563eb;
        --accent-soft: #eff6ff;
        --accent-line: #bfdbfe;
        --shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      }

      body[data-theme="dark"] {
        color-scheme: dark;
        --bg: #0b1220;
        --panel: #111827;
        --panel-soft: #0f172a;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --line: #253045;
        --line-strong: #334155;
        --accent: #60a5fa;
        --accent-soft: rgba(96, 165, 250, 0.12);
        --accent-line: rgba(96, 165, 250, 0.28);
        --shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "SF Pro Text", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input {
        font: inherit;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        background: color-mix(in srgb, var(--panel) 92%, transparent);
        backdrop-filter: blur(18px);
        border-bottom: 1px solid var(--line);
      }

      .topbar-inner,
      .page {
        width: min(1320px, calc(100vw - 32px));
        margin: 0 auto;
      }

      .topbar-inner {
        min-height: 72px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
      }

      .brand {
        min-width: 0;
      }

      .brand-title {
        margin: 0;
        display: inline-flex;
        align-items: center;
        gap: 12px;
        font-size: 1.62rem;
        line-height: 1;
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      .brand-title-gif {
        width: 42px;
        height: 42px;
        flex: 0 0 42px;
        display: block;
        border-radius: 10px;
      }

      .brand-subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .brand-curve {
        margin-top: 8px;
        width: 220px;
        height: 18px;
        display: block;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .toolbar-link,
      .theme-toggle {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        height: 40px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel);
        color: var(--text);
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
        transition: border-color 0.18s ease, background-color 0.18s ease, transform 0.18s ease;
      }

      .toolbar-link:hover,
      .theme-toggle:hover {
        border-color: var(--accent-line);
        background: var(--panel-soft);
        transform: translateY(-1px);
      }

      .toolbar-icon {
        width: 16px;
        height: 16px;
        flex: 0 0 16px;
        color: var(--accent);
      }

      .page {
        padding: 24px 0 40px;
      }

      .report-band {
        padding-top: 24px;
      }

      .report-band[hidden] {
        display: none;
      }

      .report-band-inner {
        width: min(1320px, calc(100vw - 32px));
        margin: 0 auto;
        border: 1px solid var(--line);
        border-radius: 26px;
        background: var(--panel);
        box-shadow: var(--shadow);
        padding: 22px 24px;
        display: grid;
        gap: 18px;
      }

      .report-band-title {
        margin: 0;
        font-size: 1rem;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .report-band-header {
        display: grid;
        gap: 8px;
      }

      .report-band-header-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
      }

      .report-band-title-row {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .report-band-title-icon {
        width: 18px;
        height: 18px;
        flex: 0 0 18px;
        color: var(--accent);
      }

      .report-band-disclaimer {
        margin: 0;
        color: var(--muted);
        font-size: 0.8rem;
        line-height: 1.65;
        text-align: right;
      }

      .report-band-brief {
        margin: 0;
        color: var(--text);
        font-size: 0.96rem;
        line-height: 1.82;
      }

      .report-band-columns {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .report-band-group {
        display: grid;
        gap: 12px;
      }

      .report-band-group[hidden] {
        display: none;
      }

      .report-band-group-title {
        margin: 0;
        font-size: 0.9rem;
        font-weight: 800;
        letter-spacing: -0.01em;
      }

      .report-band-list {
        display: grid;
        gap: 12px;
      }

      .report-band-item {
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--panel-soft);
      }

      .report-band-item-title {
        margin: 0;
        font-size: 0.95rem;
        font-weight: 700;
        line-height: 1.58;
      }

      .report-band-item-summary {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.72;
      }

      .report-band-refs {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .report-band-ref {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--muted);
        font-size: 0.8rem;
      }

      .report-band-ref:hover {
        border-color: var(--accent-line);
        transform: translateY(-1px);
      }

      .report-band-ref-icon {
        width: 12px;
        height: 12px;
        flex: 0 0 12px;
        color: currentColor;
        opacity: 0.88;
      }

      .report-band-ref-tone-0 {
        background: color-mix(in srgb, #dbeafe 72%, var(--panel));
        border-color: color-mix(in srgb, #93c5fd 72%, var(--line));
        color: color-mix(in srgb, #1d4ed8 84%, var(--text));
      }

      .report-band-ref-tone-1 {
        background: color-mix(in srgb, #dcfce7 72%, var(--panel));
        border-color: color-mix(in srgb, #86efac 72%, var(--line));
        color: color-mix(in srgb, #166534 84%, var(--text));
      }

      .report-band-ref-tone-2 {
        background: color-mix(in srgb, #fef3c7 72%, var(--panel));
        border-color: color-mix(in srgb, #fcd34d 72%, var(--line));
        color: color-mix(in srgb, #92400e 84%, var(--text));
      }

      .report-band-ref-tone-3 {
        background: color-mix(in srgb, #fce7f3 72%, var(--panel));
        border-color: color-mix(in srgb, #f9a8d4 72%, var(--line));
        color: color-mix(in srgb, #9d174d 84%, var(--text));
      }

      .report-band-ref-tone-4 {
        background: color-mix(in srgb, #e0f2fe 72%, var(--panel));
        border-color: color-mix(in srgb, #7dd3fc 72%, var(--line));
        color: color-mix(in srgb, #0f766e 84%, var(--text));
      }

      .report-band-ref-tone-5 {
        background: color-mix(in srgb, #ede9fe 72%, var(--panel));
        border-color: color-mix(in srgb, #c4b5fd 72%, var(--line));
        color: color-mix(in srgb, #6d28d9 84%, var(--text));
      }

      .layout {
        display: grid;
        grid-template-columns: 250px minmax(0, 1fr);
        gap: 24px;
        align-items: start;
      }

      .nav {
        position: sticky;
        top: 96px;
        align-self: start;
      }

      .nav-title {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .nav-list {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 10px;
        max-height: calc(100vh - 144px);
        overflow-y: auto;
        padding-right: 6px;
        scrollbar-width: thin;
        scrollbar-color: color-mix(in srgb, var(--line-strong) 82%, transparent) transparent;
      }

      .nav-list::-webkit-scrollbar {
        width: 8px;
      }

      .nav-list::-webkit-scrollbar-track {
        background: transparent;
      }

      .nav-list::-webkit-scrollbar-thumb {
        background: color-mix(in srgb, var(--line-strong) 82%, transparent);
        border-radius: 999px;
      }

      .nav-list::-webkit-scrollbar-thumb:hover {
        background: color-mix(in srgb, var(--accent-line) 90%, var(--line-strong));
      }

      .nav-item {
        width: 100%;
        min-width: 0;
        max-width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--panel);
        color: var(--text);
        text-align: left;
        transition: border-color 0.18s ease, background-color 0.18s ease, transform 0.18s ease;
      }

      .nav-item:hover {
        border-color: var(--accent-line);
        background: var(--panel-soft);
        transform: translateY(-1px);
      }

      .nav-item.active {
        border-color: var(--accent-line);
        background: var(--accent-soft);
      }

      .nav-label {
        flex: 1 1 auto;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .nav-count {
        flex: 0 0 auto;
        min-width: 26px;
        height: 26px;
        padding: 0 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: color-mix(in srgb, var(--panel-soft) 72%, transparent);
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 0.76rem;
        overflow: visible;
        text-overflow: clip;
        white-space: nowrap;
      }

      .feed {
        border: 1px solid var(--line);
        border-radius: 26px;
        background: var(--panel);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .site-footer {
        padding: 28px 0 40px;
      }

      .site-footer-inner {
        width: min(1320px, calc(100vw - 32px));
        margin: 0 auto;
        border-top: 1px solid var(--line);
        padding-top: 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 0.84rem;
        line-height: 1.7;
      }

      .site-footer-links {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }

      .site-footer-link {
        color: var(--muted);
        transition: color 0.18s ease;
      }

      .site-footer-link:hover {
        color: var(--text);
      }

      .focus {
        padding: 22px 24px 20px;
        border-bottom: 1px solid var(--line);
        display: grid;
        gap: 18px;
      }

      .focus[hidden] {
        display: none;
      }

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .section-title {
        margin: 0;
        font-size: 0.96rem;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .brief-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .brief-card {
        display: block;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: var(--panel-soft);
        padding: 16px 16px 15px;
        transition: border-color 0.18s ease, background-color 0.18s ease, transform 0.18s ease;
      }

      .brief-card:hover {
        border-color: var(--accent-line);
        background: color-mix(in srgb, var(--accent-soft) 36%, var(--panel-soft));
        transform: translateY(-1px);
      }

      .brief-card-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      .brief-card-title {
        margin: 0;
        font-size: 0.98rem;
        font-weight: 700;
        line-height: 1.5;
        letter-spacing: -0.01em;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .brief-card-summary {
        margin: 0;
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.72;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .brief-card-meta {
        margin-top: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 0.8rem;
      }

      .topic-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .topic-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 36px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--panel-soft);
        color: var(--text);
      }

      .topic-chip-name {
        font-size: 0.88rem;
        font-weight: 600;
      }

      .topic-chip-count {
        color: var(--muted);
        font-size: 0.8rem;
      }

      .feed-toolbar {
        padding: 22px 24px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .feed-title {
        margin: 0;
        font-size: 1.05rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .feed-caption {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .search {
        flex: 0 1 320px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        height: 44px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel-soft);
      }

      .search svg {
        width: 16px;
        height: 16px;
        color: var(--muted);
        flex: 0 0 16px;
      }

      .search input {
        width: 100%;
        border: 0;
        outline: 0;
        background: transparent;
        color: var(--text);
      }

      .list {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .item {
        display: grid;
        grid-template-columns: 56px minmax(0, 1fr) 44px;
        gap: 16px;
        align-items: center;
        padding: 18px 24px;
        border-bottom: 1px solid var(--line);
        transition: background-color 0.18s ease;
      }

      .item:last-child {
        border-bottom: 0;
      }

      .item:hover {
        background: var(--panel-soft);
      }

      .rank {
        font-size: 1.55rem;
        line-height: 1;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: #9ca3af;
      }

      .item:nth-child(1) .rank {
        color: #ef4444;
      }

      .item:nth-child(2) .rank {
        color: #f97316;
      }

      .item:nth-child(3) .rank {
        color: #f59e0b;
      }

      .title {
        margin: 0;
        font-size: 1rem;
        font-weight: 600;
        line-height: 1.6;
        letter-spacing: -0.01em;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .title a:hover {
        color: var(--accent);
      }

      .meta {
        margin-top: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 0.84rem;
      }

      .summary {
        margin-top: 10px;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.75;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 24px;
        padding: 0 10px;
        border-radius: 999px;
        background: var(--panel-soft);
        border: 1px solid var(--line);
        color: var(--text);
      }

      .meta-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 24px;
        padding: 0 10px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: color-mix(in srgb, var(--panel-soft) 68%, transparent);
        color: var(--muted);
        transition: border-color 0.18s ease, color 0.18s ease, background-color 0.18s ease;
      }

      .meta-link:hover {
        border-color: var(--accent-line);
        color: var(--accent);
        background: color-mix(in srgb, var(--accent-soft) 36%, var(--panel-soft));
      }

      .meta-link svg {
        width: 12px;
        height: 12px;
        flex: 0 0 12px;
      }

      .meta-note {
        color: var(--muted);
      }

      .domain {
        max-width: 240px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .open-link {
        width: 36px;
        height: 36px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: var(--muted);
        background: var(--panel);
        transition: border-color 0.18s ease, color 0.18s ease, background-color 0.18s ease;
      }

      .item:hover .open-link {
        border-color: var(--accent-line);
        color: var(--accent);
        background: color-mix(in srgb, var(--accent-soft) 52%, var(--panel));
      }

      .open-link svg {
        width: 15px;
        height: 15px;
      }

      .empty {
        padding: 28px 24px;
        color: var(--muted);
        line-height: 1.8;
      }

      @media (max-width: 1080px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .nav {
          position: static;
        }

        .nav-list {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          max-height: none;
          overflow: visible;
          padding-right: 0;
        }
      }

      @media (max-width: 720px) {
        .topbar-inner {
          align-items: flex-start;
          flex-wrap: wrap;
          padding: 14px 0;
          min-height: unset;
        }

        .topbar-inner,
        .page {
          width: min(100vw - 20px, 1320px);
        }

        .brand {
          width: 100%;
        }

        .brand-title {
          font-size: 1.42rem;
        }

        .brand-title-gif {
          width: 36px;
          height: 36px;
          flex-basis: 36px;
        }

        .brand-curve {
          width: 180px;
          height: 16px;
        }

        .toolbar {
          width: 100%;
          justify-content: flex-start;
          margin-top: 8px;
        }

        .toolbar-link,
        .theme-toggle {
          flex: 0 1 auto;
          min-width: 0;
        }

        .report-band-inner {
          width: min(100vw - 20px, 1320px);
          padding: 18px 16px;
        }

        .report-band-columns {
          grid-template-columns: 1fr;
        }

        .report-band-header-top {
          flex-wrap: wrap;
          gap: 8px;
        }

        .report-band-disclaimer {
          width: 100%;
          text-align: left;
        }

        .nav-list {
          grid-template-columns: 1fr 1fr;
        }

        .feed-toolbar {
          padding: 18px 16px;
          align-items: stretch;
          flex-direction: column;
        }

        .search {
          width: 100%;
          flex-basis: auto;
        }

        .item {
          grid-template-columns: 42px minmax(0, 1fr);
          padding: 16px;
        }

        .open-link {
          display: none;
        }

        .rank {
          font-size: 1.28rem;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <h1 class="brand-title">
            <span>大火蒸馏</span>
            <img class="brand-title-gif" src="./assets/images/zl.gif" alt="">
          </h1>
          <p class="brand-subtitle" id="brand-subtitle">Less, but Better</p>
          <svg class="brand-curve" viewBox="0 0 220 18" fill="none" aria-hidden="true">
            <defs>
              <linearGradient id="brand-curve-gradient" x1="0" y1="9" x2="220" y2="9" gradientUnits="userSpaceOnUse">
                <stop stop-color="#60A5FA"/>
                <stop offset="0.5" stop-color="#A78BFA"/>
                <stop offset="1" stop-color="#22C55E"/>
              </linearGradient>
            </defs>
            <path d="M2 12.5C24 2.5 42 2.5 61 9.8C82 17.3 101 16.8 121 8.9C140 1.5 158 1.8 178 8.4C191 12.6 204 13.5 218 8.2" stroke="url(#brand-curve-gradient)" stroke-width="3" stroke-linecap="round"/>

    <script>
      const state = {
        articles: [],
        aiReport: null,
        sourceFilter: "全部",
        query: "",
        generatedAt: ""
      };

      const articleList = document.getElementById("article-list");
      const sourceFilters = document.getElementById("source-filters");
      const feedCaption = document.getElementById("feed-caption");
      const searchInput = document.getElementById("search-input");
      const themeToggle = document.getElementById("theme-toggle");
      const themeIcon = document.getElementById("theme-icon");
      const brandSubtitle = document.getElementById("brand-subtitle");
      const feedSection = document.querySelector(".feed");
      const aiReportBriefSection = document.getElementById("ai-report-brief-section");
      const aiReportBrief = document.getElementById("ai-report-brief");
      const aiReportFactsSection = document.getElementById("ai-report-facts-section");
      const aiReportFacts = document.getElementById("ai-report-facts");
      const aiReportOpinionsSection = document.getElementById("ai-report-opinions-section");
      const aiReportOpinions = document.getElementById("ai-report-opinions");

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll("\"", "&quot;")
          .replaceAll("'", "&#39;");
      }

      function formatNumber(value) {
        return new Intl.NumberFormat("zh-CN").format(Number(value || 0));
      }

      function formatDate(value) {
        if (!value) {
          return "--";
        }

        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return value;
        }

        return new Intl.DateTimeFormat("zh-CN", {
          month: "numeric",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit"
        }).format(date);
      }

      function parsePublicRss(xmlText) {
        const parser = new DOMParser();
        const documentNode = parser.parseFromString(xmlText, "application/xml");
        const parseError = documentNode.querySelector("parsererror");
        if (parseError) {
          throw new Error("RSS 解析失败");
        }

        const channel = documentNode.querySelector("channel");
        if (!channel) {
          throw new Error("RSS channel 缺失");
        }

        const generatedAt = channel.querySelector("lastBuildDate")?.textContent?.trim() || "";
        const articles = [...channel.querySelectorAll("item")].map((item) => ({
          title: item.querySelector("title")?.textContent?.trim() || "",
          link: item.querySelector("link")?.textContent?.trim() || "",
          summary: item.querySelector("description")?.textContent?.trim() || "",
          source_name: item.querySelector("source")?.textContent?.trim() || "Unknown Source",
          published_at: ""
        })).filter((article) => article.title && article.link);

        const sourceCount = new Set(
          articles.map((article) => sanitizeSourceName(article.source_name || "")).filter(Boolean)
        ).size;

        return {
          generatedAt,
          sourceCount,
          articles
        };
      }

      function sanitizeSourceName(value) {
        return String(value || "")
          .replace(/\s+/g, " ")
          .trim()
          .replace(/\s*[（(](playwright|opencli|puppeteer|browser)[）)]\s*$/i, "")
          .trim();
      }

      function stripReportSourceCodes(value) {
        return String(value || "")
          .replace(/\s*[（(]\s*(?:S\d+\s*[,，、/]\s*)*S\d+\s*[)）]\s*/gi, " ")
          .replace(/\s+/g, " ")
          .replace(/\s+([，。！？；：,.!?;:])/g, "$1")
          .replace(/([，。！？；：,.!?;:])\s*([，。！？；：,.!?;:])/g, "$1")
          .trim();
      }

      function isHackerNewsDerivedSource(sourceName) {
        return sanitizeSourceName(sourceName || "").startsWith("Hacker News");
      }

      function parseHackerNewsSummary(summary) {
        const text = String(summary || "");
        const articleUrlMatch = text.match(/Article URL:\s*(https?:\/\/\S+)/i);
        const commentsUrlMatch = text.match(/Comments URL:\s*(https?:\/\/\S+)/i);
        const pointsMatch = text.match(/Points:\s*(\d+)/i);
        const commentsMatch = text.match(/#\s*Comments:\s*(\d+)/i);
        return {
          articleUrl: articleUrlMatch ? articleUrlMatch[1] : "",
          commentsUrl: commentsUrlMatch ? commentsUrlMatch[1] : "",
          points: pointsMatch ? pointsMatch[1] : "",
          comments: commentsMatch ? commentsMatch[1] : "",
          matched: Boolean(articleUrlMatch || commentsUrlMatch || pointsMatch || commentsMatch)
        };
      }

      function getArticlePresentation(article) {
        const sourceName = sanitizeSourceName(article.source_name || "");
        const hnMeta = isHackerNewsDerivedSource(sourceName) ? parseHackerNewsSummary(article.summary) : null;
        const articleLink = hnMeta && hnMeta.articleUrl ? hnMeta.articleUrl : String(article.link || "");
        const discussionLink = hnMeta && hnMeta.commentsUrl ? hnMeta.commentsUrl : "";
        const sourceBadgeLabel = discussionLink ? `经由 ${sourceName}` : sourceName;

        let summary = String(article.summary || "").trim();
        if (hnMeta && hnMeta.matched) {
          summary = "";
        }

        let activityLabel = "";
        if (hnMeta && (hnMeta.points || hnMeta.comments)) {
          const parts = [];
          if (hnMeta.points) {
            parts.push(`${hnMeta.points} 分`);
          }
          if (hnMeta.comments) {
            parts.push(`${hnMeta.comments} 评`);
          }
          activityLabel = parts.length ? `HN · ${parts.join(" · ")}` : "";
        }

        return {
          sourceName,
          sourceBadgeLabel,
          articleLink,
          discussionLink,
          summary,
          activityLabel
        };
      }

      function buildTextUnits(value) {
        const normalized = String(value || "")
          .toLowerCase()
          .replace(/\s+/g, " ")
          .trim();
        if (!normalized) {
          return [];
        }

        const units = new Set();
        for (const token of normalized.match(/[a-z0-9]+/g) || []) {
          if (token.length > 1) {
            units.add(token);
          }
        }

        const cjkText = (normalized.match(/[\u4e00-\u9fff]/g) || []).join("");
        if (cjkText.length === 1) {
          units.add(cjkText);
        } else {
          for (let index = 0; index < cjkText.length - 1; index += 1) {
            units.add(cjkText.slice(index, index + 2));
          }
        }

        return [...units];
      }

      function entrySimilarity(left, right) {
        const leftUnits = new Set(buildTextUnits(`${left.title || ""} ${left.summary || ""}`));
        const rightUnits = new Set(buildTextUnits(`${right.title || ""} ${right.summary || ""}`));
        if (!leftUnits.size || !rightUnits.size) {
          return 0;
        }

        let intersection = 0;
        for (const unit of leftUnits) {
          if (rightUnits.has(unit)) {
            intersection += 1;
          }
        }

        const union = new Set([...leftUnits, ...rightUnits]).size;
        return union ? intersection / union : 0;
      }

      function entriesOverlap(left, right) {
        const leftIds = new Set(Array.isArray(left.article_ids) ? left.article_ids.filter(Boolean) : []);
        const rightIds = new Set(Array.isArray(right.article_ids) ? right.article_ids.filter(Boolean) : []);
        const leftTitle = String(left.title || "").trim().toLowerCase();
        const rightTitle = String(right.title || "").trim().toLowerCase();

        if (leftIds.size && rightIds.size && leftIds.size === rightIds.size) {
          let sameIds = true;
          for (const articleId of leftIds) {
            if (!rightIds.has(articleId)) {
              sameIds = false;
              break;
            }
          }
          if (sameIds) {
            return true;
          }
        }

        if (leftTitle && rightTitle && (leftTitle.includes(rightTitle) || rightTitle.includes(leftTitle))) {
          return true;
        }

        if (leftIds.size && rightIds.size) {
          let overlapCount = 0;
          for (const articleId of leftIds) {
            if (rightIds.has(articleId)) {
              overlapCount += 1;
            }
          }
          if (overlapCount > 0 && entrySimilarity(left, right) >= 0.24) {
            return true;
          }
        }

        return false;
      }

      function normalizeReportEntry(item) {
        if (!item || typeof item !== "object") {
          return null;
        }

        const title = String(item.title || "")
          .replace(/\s+/g, " ")
          .trim();
        const summary = stripReportSourceCodes(item.summary || item.title || "");

        if (!title || !summary) {
          return null;
        }

        return {
          title,
          summary,
          score: Number(item.score || 0),
          article_ids: Array.isArray(item.article_ids) ? item.article_ids.map((value) => String(value || "")).filter(Boolean) : [],
          references: Array.isArray(item.references)
            ? item.references
                .filter((reference) => reference && typeof reference === "object")
                .map((reference) => ({
                  ...reference,
                  source_name: sanitizeSourceName(reference.source_name || "")
                }))
            : []
        };
      }

      function dedupeReportEntries(items) {
        const deduped = [];
        for (const item of items) {
          const normalized = normalizeReportEntry(item);
          if (!normalized) {
            continue;
          }
          if (deduped.some((existing) => entriesOverlap(existing, normalized))) {
            continue;
          }
          deduped.push(normalized);
        }
        return deduped.slice(0, 6);
      }

      function filterRedundantOpinions(facts, opinions) {
        const kept = [];
        const factArticleIds = facts.map((fact) => new Set(Array.isArray(fact.article_ids) ? fact.article_ids : []));

        for (const opinion of opinions) {
          const opinionIds = new Set(Array.isArray(opinion.article_ids) ? opinion.article_ids : []);
          if (opinionIds.size === 1 && factArticleIds.some((factIds) => [...opinionIds].some((id) => factIds.has(id)))) {
            continue;
          }

          if (facts.some((fact) => entriesOverlap(fact, opinion))) {
            continue;
          }

          if (kept.some((existing) => entriesOverlap(existing, opinion))) {
            continue;
          }

          kept.push(opinion);
        }

        return kept.slice(0, 6);
      }

      function prepareAiReport(report) {
        if (!report || typeof report !== "object") {
          return null;
        }

        const facts = dedupeReportEntries(Array.isArray(report.highlight_facts) ? report.highlight_facts : []);
        const opinions = filterRedundantOpinions(
          facts,
          dedupeReportEntries(Array.isArray(report.highlight_opinions) ? report.highlight_opinions : [])
        );

        return {
          ...report,
          global_brief: stripReportSourceCodes(report.global_brief || ""),
          highlight_facts: facts,
          highlight_opinions: opinions
        };
      }

      function getDomain(value) {
        try {
          const url = new URL(value);
          return url.hostname.replace(/^www\./, "");
        } catch (error) {
          return "";
        }
      }

      function getThemeIcon(theme) {
        if (theme === "dark") {
          return '<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>';
        }

        return '<circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="1.8"/><path d="M12 2.8v2.1M12 19.1v2.1M21.2 12h-2.1M4.9 12H2.8M18.5 5.5 17 7M7 17l-1.5 1.5M18.5 18.5 17 17M7 7 5.5 5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>';
      }

      function setTheme(theme) {
        document.body.dataset.theme = theme;
        themeIcon.innerHTML = getThemeIcon(theme);
        localStorage.setItem("news-push-theme", theme);
      }

      function restoreTheme() {
        const savedTheme = localStorage.getItem("news-push-theme");
        if (savedTheme === "dark" || savedTheme === "light") {
          setTheme(savedTheme);
          return;
        }

        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        setTheme(prefersDark ? "dark" : "light");
      }

      function getVisibleArticles() {
        const query = state.query.trim().toLowerCase();

        return state.articles.filter((article) => {
          const sourceName = sanitizeSourceName(article.source_name || "");
          const matchesSource = state.sourceFilter === "全部" || sourceName === state.sourceFilter;
          const matchesQuery =
            !query ||
            article.title.toLowerCase().includes(query) ||
            sourceName.toLowerCase().includes(query);

          return matchesSource && matchesQuery;
        });
      }

      function renderReferenceLinks(references) {
        if (!Array.isArray(references) || !references.length) {
          return "";
        }

        return `
          <div class="report-band-refs">
            ${references
              .slice(0, 4)
              .map((reference, index) => `
                <a class="report-band-ref report-band-ref-tone-${index % 6}" href="${escapeHtml(reference.link || "#")}" target="_blank" rel="noreferrer">
                  <svg class="report-band-ref-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M10 14 14 10M7.5 16.5l-1 1a3 3 0 1 1-4.2-4.2l3.4-3.4a3 3 0 0 1 4.2 0M16.5 7.5l1-1a3 3 0 1 1 4.2 4.2l-3.4 3.4a3 3 0 0 1-4.2 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  <span>${escapeHtml(sanitizeSourceName(reference.source_name || ""))}</span>
                </a>
              `)
              .join("")}
          </div>
        `;
      }

      function renderReportItems(items) {
        return items
          .slice(0, 6)
          .map((item) => `
            <article class="report-band-item">
              <h4 class="report-band-item-title">${escapeHtml(item.title || "")}</h4>
              ${item.summary ? `<p class="report-band-item-summary">${escapeHtml(item.summary)}</p>` : ""}
              ${renderReferenceLinks(item.references)}
            </article>
          `)
          .join("");
      }

      function renderAiReport() {
        if (!aiReportBriefSection || !aiReportBrief || !aiReportFactsSection || !aiReportFacts || !aiReportOpinionsSection || !aiReportOpinions) {
          return;
        }

        const report = state.aiReport;
        const hasBrief = Boolean(report && report.global_brief);
        const facts = Array.isArray(report && report.highlight_facts) ? report.highlight_facts : [];
        const opinions = Array.isArray(report && report.highlight_opinions) ? report.highlight_opinions : [];

        aiReportBriefSection.hidden = !hasBrief;
        aiReportFactsSection.hidden = facts.length === 0;
        aiReportOpinionsSection.hidden = opinions.length === 0;
        aiReportBrief.textContent = report && report.global_brief ? report.global_brief : "";
        aiReportFacts.innerHTML = renderReportItems(facts);
        aiReportOpinions.innerHTML = renderReportItems(opinions);
      }

      function scrollResultsToTop() {
        if (!feedSection) {
          return;
        }

        const targetTop = Math.max(
          Math.round(feedSection.getBoundingClientRect().top + window.scrollY - 88),
          0
        );
        const startTop = window.scrollY;
        const destinationTop = startTop > targetTop ? targetTop : startTop;
        const distance = destinationTop - startTop;

        if (Math.abs(distance) < 8) {
          window.scrollTo(0, destinationTop);
          return;
        }

        const duration = 140;
        const startedAt = performance.now();

        const tick = (now) => {
          const progress = Math.min((now - startedAt) / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          window.scrollTo(0, Math.round(startTop + distance * eased));
          if (progress < 1) {
            requestAnimationFrame(tick);
          }
        };

        requestAnimationFrame(tick);
      }

      function renderFilters() {
        const counts = new Map();

        for (const article of state.articles) {
          const sourceName = sanitizeSourceName(article.source_name || "");
          counts.set(sourceName, (counts.get(sourceName) || 0) + 1);
        }

        const filterNames = [
          ["全部", state.articles.length],
          ...[...counts.entries()].sort((a, b) => b[1] - a[1])
        ];

        sourceFilters.innerHTML = filterNames
          .map(([name, count]) => `
            <button
              type="button"
              class="nav-item ${name === state.sourceFilter ? "active" : ""}"
              data-source="${escapeHtml(name)}"
            >
              <span class="nav-label">${escapeHtml(name)}</span>
              <span class="nav-count">${formatNumber(count)}</span>
            </button>
          `)
          .join("");

        for (const button of sourceFilters.querySelectorAll("[data-source]")) {
          button.addEventListener("click", () => {
            state.sourceFilter = button.dataset.source;
            renderFilters();
            renderArticles();
            scrollResultsToTop();
          });
        }
      }

      function renderArticles() {
        const visible = getVisibleArticles();
        const updatedSuffix = state.generatedAt ? ` · 更新于 ${formatDate(state.generatedAt)}` : "";
        feedCaption.textContent = `展示最近 24 小时内容${updatedSuffix}。`;

        articleList.innerHTML = visible.length
          ? visible
              .slice(0, 120)
              .map((article, index) => {
                const presentation = getArticlePresentation(article);
                const domain = getDomain(presentation.articleLink || article.link);
                const publishedAt = article.published_at ? `<span>${escapeHtml(formatDate(article.published_at))}</span>` : "";
                return `
                  <li class="item">
                    <div class="rank">${index + 1}</div>
                    <div>
                      <p class="title">
                        <a href="${escapeHtml(presentation.articleLink || article.link)}" target="_blank" rel="noreferrer">${escapeHtml(article.title)}</a>
                      </p>
                      <div class="meta">
                        <span class="badge">${escapeHtml(presentation.sourceBadgeLabel)}</span>
                        ${presentation.discussionLink ? `
                          <a class="meta-link" href="${escapeHtml(presentation.discussionLink)}" target="_blank" rel="noreferrer" aria-label="打开 Hacker News 讨论">
                            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                              <path d="M6.75 8.75h10.5M6.75 12h7.5M9.5 15.25h4.75M6 4.75h12a2.25 2.25 0 0 1 2.25 2.25v8A2.25 2.25 0 0 1 18 17.25h-7.172L6.75 20v-2.75H6A2.25 2.25 0 0 1 3.75 15V7A2.25 2.25 0 0 1 6 4.75Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <span>HN 讨论</span>
                          </a>
                        ` : ""}
                        ${publishedAt}
                        ${domain ? `<span class="domain">${escapeHtml(domain)}</span>` : ""}
                        ${presentation.activityLabel ? `<span class="meta-note">${escapeHtml(presentation.activityLabel)}</span>` : ""}
                      </div>
                      ${presentation.summary && presentation.summary !== article.title ? `<p class="summary">${escapeHtml(presentation.summary)}</p>` : ""}
                    </div>
                    <a class="open-link" href="${escapeHtml(presentation.articleLink || article.link)}" target="_blank" rel="noreferrer" aria-label="打开原文">
                      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M8 16 16 8M10 8h6v6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                      </svg>
                    </a>
                  </li>
                `;
              })
              .join("")
          : '<li class="empty">没有匹配到结果，试试切换来源或清空搜索词。</li>';
      }

      async function loadData() {
        try {
          const [rssResponse, aiReportResponse] = await Promise.all([
            fetch("./rss.xml", { cache: "no-store" }),
            fetch("./ai-report.json", { cache: "no-store" }).catch(() => null)
          ]);

          if (!rssResponse.ok) {
            throw new Error("RSS 文件读取失败");
          }

          const rss = parsePublicRss(await rssResponse.text());
          let aiReport = null;

          if (aiReportResponse && aiReportResponse.ok) {
            aiReport = await aiReportResponse.json();
          }
          const articles = Array.isArray(rss.articles) ? rss.articles.slice() : [];

          state.articles = articles;
          state.aiReport = prepareAiReport(aiReport);
          state.generatedAt = rss.generatedAt || "";
          if (brandSubtitle) {
            brandSubtitle.textContent = "Less, but Better";
          }
          renderAiReport();
          renderFilters();
          renderArticles();
        } catch (error) {
          feedCaption.textContent = "数据读取失败";
          articleList.innerHTML = `<li class="empty">页面未能加载数据文件：${escapeHtml(error.message || error)}</li>`;
        }
      }

      searchInput.addEventListener("input", (event) => {
        state.query = event.target.value || "";
        renderArticles();
      });

      themeToggle.addEventListener("click", () => {
        const nextTheme = document.body.dataset.theme === "dark" ? "light" : "dark";
        setTheme(nextTheme);
      });

      restoreTheme();
      loadData();
    </script>
  </body>
</html>
